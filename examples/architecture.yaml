version: "1.0"
metadata:
  name: "web-application-infrastructure"
  description: "Production web application with load balancer"
  owner: "platform-team"
  created: "2026-06-01"
  
provider:
  name: "aws"
  region: "us-east-1"

resources:
  # VPC
  - type: vpc
    name: main-vpc
    attributes:
      cidr_block: "10.0.0.0/16"
      enable_dns_hostnames: true
      enable_dns_support: true
    tags:
      Name: "main-vpc"
      Environment: "production"
      ManagedBy: "terraform"
      Project: "web-app"

  # Public Subnet
  - type: subnet
    name: public-subnet-1a
    attributes:
      vpc: main-vpc
      cidr_block: "10.0.1.0/24"
      availability_zone: "us-east-1a"
      map_public_ip_on_launch: true
    tags:
      Name: "public-subnet-1a"
      Environment: "production"
      ManagedBy: "terraform"

  # Private Subnet (WILL BE MISSING IN AWS)
  - type: subnet
    name: private-subnet-1b
    attributes:
      vpc: main-vpc
      cidr_block: "10.0.2.0/24"
      availability_zone: "us-east-1b"
      map_public_ip_on_launch: false
    tags:
      Name: "private-subnet-1b"
      Environment: "production"
      ManagedBy: "terraform"

  # Database Subnet (RELATIONSHIP BROKEN)
  - type: subnet
    name: database-subnet-1c
    attributes:
      vpc: main-vpc
      cidr_block: "10.0.3.0/24"
      availability_zone: "us-east-1c"
      map_public_ip_on_launch: false
    relationships:
      - type: route_table
        target: private-route-table
    tags:
      Name: "database-subnet-1c"
      Environment: "production"
      ManagedBy: "terraform"

  # Web Security Group
  - type: security_group
    name: web-sg
    attributes:
      vpc: main-vpc
      description: "Security group for web servers"
      ingress_rules:
        - protocol: tcp
          from_port: 80
          to_port: 80
          cidr_blocks: ["0.0.0.0/0"]
          description: "HTTP from internet"
        - protocol: tcp
          from_port: 443
          to_port: 443
          cidr_blocks: ["0.0.0.0/0"]
          description: "HTTPS from internet"
      egress_rules:
        - protocol: "-1"
          from_port: 0
          to_port: 0
          cidr_blocks: ["0.0.0.0/0"]
          description: "All outbound traffic"
    tags:
      Name: "web-sg"
      Environment: "production"
      ManagedBy: "terraform"

  # Web Server EC2 Instance
  - type: ec2_instance
    name: web-server
    attributes:
      instance_type: "t3.medium"
      ami: "ami-0c55b159cbfafe1f0"
      subnet: public-subnet-1a
      security_groups: [web-sg]
      user_data: |
        #!/bin/bash
        yum update -y
        yum install -y httpd
        systemctl start httpd
    tags:
      Name: "web-server"
      Environment: "production"
      ManagedBy: "terraform"
      Role: "webserver"

  # Application Load Balancer
  - type: alb
    name: web-alb
    attributes:
      subnets: [public-subnet-1a, private-subnet-1b]
      security_groups: [web-sg]
      scheme: "internet-facing"
      idle_timeout: 60
      enable_deletion_protection: false
      enable_http2: true
    tags:
      Name: "web-alb"
      Environment: "production"
      ManagedBy: "terraform"

# Made with Bob
